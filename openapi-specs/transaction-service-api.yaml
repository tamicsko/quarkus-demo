openapi: 3.0.3
info:
  title: Transaction Service API
  description: Tranzakciókezelés — átutalások indítása, státusz lekérése
  version: 1.0.0

tags:
  - name: Transaction
    description: Tranzakció műveletek

paths:
  /api/transactions:
    get:
      tags: [Transaction]
      operationId: listTransactions
      summary: Tranzakciók listázása (opcionális szűrés accountId-re)
      parameters:
        - name: accountId
          in: query
          required: false
          description: Szűrés számla azonosítóra (from vagy to)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Tranzakciók listája
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionDto"

    post:
      tags: [Transaction]
      operationId: createTransaction
      summary: Új tranzakció (átutalás) indítása
      description: |
        Létrehozza a tranzakciót PENDING státusszal, majd:
        1. Debit a küldő számláról (Account Service hívás)
        2. Credit a fogadó számlára (Account Service hívás)
        3. Ha mindkettő sikeres: COMPLETED
        4. Ha bármelyik sikertelen: FAILED + kompenzáció
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Tranzakció létrehozva (lehet COMPLETED vagy FAILED)
          headers:
            Location:
              description: A tranzakció URL-je
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDto"
        "400":
          description: Érvénytelen kérés (pl. negatív összeg, azonos számla)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/transactions/{id}:
    get:
      tags: [Transaction]
      operationId: getTransaction
      summary: Tranzakció lekérése azonosító alapján
      parameters:
        - $ref: "#/components/parameters/TransactionId"
      responses:
        "200":
          description: Tranzakció adatai
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDto"
        "404":
          description: Tranzakció nem található
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/transactions/ref/{ref}/status:
    get:
      tags: [Transaction]
      operationId: getTransactionStatusByRef
      summary: Tranzakció státusz lekérése referencia alapján
      parameters:
        - name: ref
          in: path
          required: true
          description: Tranzakció referencia (UUID)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Tranzakció státusz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionStatusDto"
        "404":
          description: Tranzakció nem található
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    TransactionId:
      name: id
      in: path
      required: true
      description: Tranzakció azonosító
      schema:
        type: string
        format: uuid

  schemas:
    TransactionDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        transactionRef:
          type: string
          format: uuid
          description: Egyedi tranzakció referencia
        fromAccountId:
          type: string
          format: uuid
        toAccountId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        currency:
          type: string
          example: "HUF"
        status:
          $ref: "#/components/schemas/TransactionStatus"
        failureReason:
          type: string
          nullable: true
          description: Hiba oka (csak FAILED státusz esetén)
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    CreateTransactionRequest:
      type: object
      required:
        - fromAccountId
        - toAccountId
        - amount
        - currency
      properties:
        fromAccountId:
          type: string
          format: uuid
          description: Küldő számla azonosító
        toAccountId:
          type: string
          format: uuid
          description: Fogadó számla azonosító
        amount:
          type: number
          format: double
          description: Átutalás összege (pozitív szám)
          example: 50000.00
        currency:
          type: string
          description: Pénznem
          example: "HUF"

    TransactionStatusDto:
      type: object
      properties:
        transactionRef:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/TransactionStatus"
        failureReason:
          type: string
          nullable: true

    TransactionStatus:
      type: string
      enum:
        - PENDING
        - COMPLETED
        - FAILED
        - REVERSED

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        timestamp:
          type: string
          format: date-time
