apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: bank-demo
  labels:
    app: frontend
    app.kubernetes.io/part-of: bank-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: image-registry.openshift-image-registry.svc:5000/bank-demo/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: bank-demo
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
# Route — ez a fő belépési pont a felhasználók számára
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: bank-demo
  namespace: bank-demo
spec:
  to:
    kind: Service
    name: frontend
  port:
    targetPort: 80
