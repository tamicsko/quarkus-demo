apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-java21
  namespace: tamicsko-dev
  labels:
    app.kubernetes.io/part-of: bank-demo
spec:
  description: Maven build with Java 21 for OpenShift environments without unzip/gzip
  params:
    - name: GOALS
      type: array
      default:
        - package
    - name: SUBDIRECTORY
      type: string
      default: ""
  workspaces:
    - name: source
  steps:
    - name: maven-build
      image: registry.access.redhat.com/ubi9/openjdk-21:1.20
      workingDir: $(workspaces.source.path)/$(params.SUBDIRECTORY)
      args: ["$(params.GOALS[*])"]
      env:
        - name: MAVEN_USER_HOME
          value: "$(workspaces.source.path)/.maven"
      script: |
        #!/bin/bash
        set -e
        echo "=== Java $(java -version 2>&1 | head -1) ==="
        echo "Working dir: $(pwd)"
        echo ""
        mkdir -p /tmp/bin
        echo "" | base64 -d > /tmp/bin/unzip
        chmod +x /tmp/bin/unzip
        export PATH="/tmp/bin:$PATH"
        # Fix permissions on cached maven (jar xf doesn't preserve execute bits)
        find "${MAVEN_USER_HOME}" -path "*/bin/*" -type f -exec chmod +x {} + 2>/dev/null || true
        echo "=== Running: bash mvnw $@ ==="
        bash mvnw "$@"
