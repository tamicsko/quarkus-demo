# ServiceAccount a pipeline számára + jogosultságok
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-sa
  namespace: tamicsko-dev
---
# A pipeline-nak kell: image push, deployment restart, build futtatás
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-edit
  namespace: tamicsko-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: pipeline-sa
    namespace: tamicsko-dev
---
# A pipeline SA-nak kell a belső registry-be push-olnia
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-image-builder
  namespace: tamicsko-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-builder
subjects:
  - kind: ServiceAccount
    name: pipeline-sa
    namespace: tamicsko-dev
