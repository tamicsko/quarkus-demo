# BuildConfig — Java service-ek (binary build + inline Dockerfile)
# Az oc start-build --from-dir paranccsal töltjük fel a JAR-okat
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: customer-service
  namespace: tamicsko-dev
spec:
  output:
    to:
      kind: ImageStreamTag
      name: customer-service:latest
  source:
    type: Binary
    dockerfile: |
      FROM registry.access.redhat.com/ubi8/openjdk-21:1.20
      ENV LANGUAGE="en_US:en"
      COPY --chown=185 lib/ /deployments/lib/
      COPY --chown=185 *.jar /deployments/
      COPY --chown=185 app/ /deployments/app/
      COPY --chown=185 quarkus/ /deployments/quarkus/
      EXPOSE 8080
      ENV JAVA_OPTS_APPEND="-Dquarkus.http.host=0.0.0.0 -Djava.util.logging.manager=org.jboss.logmanager.LogManager"
      ENV JAVA_APP_JAR="/deployments/quarkus-run.jar"
  strategy:
    type: Docker
    dockerStrategy: {}
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: customer-service
  namespace: tamicsko-dev
---
