apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: tamicsko-dev
  labels:
    app: transaction-service
    app.kubernetes.io/part-of: bank-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      containers:
        - name: transaction-service
          image: image-registry.openshift-image-registry.svc:5000/tamicsko-dev/transaction-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: QUARKUS_PROFILE
              value: container
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tx-svc-db
                  key: password
            - name: ACCOUNT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: ACCOUNT_SERVICE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: tamicsko-dev
spec:
  selector:
    app: transaction-service
  ports:
    - port: 8083
      targetPort: 8083
