<h1>Dashboard</h1>

@if (loading()) {
  <div class="loading">
    <mat-spinner diameter="48"></mat-spinner>
  </div>
} @else {
  <div class="cards">
    <mat-card>
      <mat-card-header>
        <mat-icon mat-card-avatar>people</mat-icon>
        <mat-card-title>{{ clients().length }}</mat-card-title>
        <mat-card-subtitle>Clients</mat-card-subtitle>
      </mat-card-header>
      <mat-card-actions>
        <a mat-button routerLink="/clients">View all</a>
      </mat-card-actions>
    </mat-card>

    <mat-card>
      <mat-card-header>
        <mat-icon mat-card-avatar>account_balance</mat-icon>
        <mat-card-title>{{ totalAccounts() }}</mat-card-title>
        <mat-card-subtitle>Accounts</mat-card-subtitle>
      </mat-card-header>
    </mat-card>

    <mat-card>
      <mat-card-header>
        <mat-icon mat-card-avatar>swap_horiz</mat-icon>
        <mat-card-title>Transfer</mat-card-title>
        <mat-card-subtitle>Send money</mat-card-subtitle>
      </mat-card-header>
      <mat-card-actions>
        <a mat-button routerLink="/transfer">New transfer</a>
      </mat-card-actions>
    </mat-card>
  </div>
}
