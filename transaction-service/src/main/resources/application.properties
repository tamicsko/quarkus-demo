# =============================================================================
# Transaction Service — közös (profil-független) konfiguráció
# =============================================================================

quarkus.application.name=transaction-service
quarkus.http.port=8083

# Hibernate — Liquibase kezeli a sémát
quarkus.hibernate-orm.schema-management.strategy=none

# Liquibase
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changeLog.xml
quarkus.liquibase.default-schema-name=tx_svc

# Logging
quarkus.log.category."dev.benno".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) [%X{correlationId}] %s%e%n
