# =============================================================================
# Backend (BFF) — Dev profil (lokális fejlesztés, quarkus dev)
# =============================================================================

# Service URL-ek — lokálisan minden localhost-on fut, más porton
quarkus.rest-client.customer-service-api.url=http://localhost:8081
quarkus.rest-client.account-service-api.url=http://localhost:8082
quarkus.rest-client.transaction-service-api.url=http://localhost:8083

# CORS — dev módban a frontend localhost:4200-on fut (ng serve)
# Konténerben nem kell, mert nginx proxy kezeli (ugyanaz az origin)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,content-type,x-correlation-id
quarkus.http.cors.exposed-headers=x-correlation-id

quarkus.log.console.json.enabled=false
